<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-slate-100 flex flex-col">

    <nav class="bg-white shadow-md">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-indigo-600">
                Add Student
            </h1>

            <a href="{% url 'shome' %}"
                class="bg-slate-600 hover:bg-slate-700 text-white px-4 py-2 rounded-lg transition">
                Back to Home
            </a>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center px-4 py-10">

        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-xl p-8">

            <h2 class="text-3xl font-bold text-slate-800 mb-8 text-center">
                Student Information
            </h2>

            <form method="POST" enctype="multipart/form-data" class="space-y-6">

                {% csrf_token %}

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Student Name
                    </label>

                    <input type="text" name="name" required placeholder="Enter student name"
                        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Date of Birth
                    </label>

                    <input type="date" name="dob" required
                        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Class
                    </label>

                    <input type="text" name="div" required placeholder="Example: A"
                        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Year
                    </label>

                    <input type="number" name="year" min="1" required placeholder="Enter year"
                        class="w-full border border-slate-300 rounded-lg px-4 py-3 focus:ring-2 focus:ring-indigo-500 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-2">
                        Student Photo
                    </label>

                    <input type="file" name="img" accept="image/*" required
                        class="w-full border border-slate-300 rounded-lg px-4 py-3 bg-white file:mr-4 file:py-2 file:px-4 file:border-0 file:bg-indigo-600 file:text-white file:rounded-md hover:file:bg-indigo-700">
                </div>

                <div class="flex justify-center pt-6">
                
                    <button type="submit"
                        class="bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white px-12 py-3 rounded-xl font-semibold shadow-lg hover:scale-105 transition duration-300">
                        Add Student
                    </button>
                
                </div>

            </form>

        </div>

    </main>

    <footer class="bg-slate-900 text-white text-center py-4">
        © 2026 Student Management System
    </footer>

</body>

</html>
