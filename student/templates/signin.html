<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script> -->

</head>


<body class="bg-gray-900">

    <div class="min-h-screen flex flex-col items-center justify-center px-6">

        <h2 class="text-4xl md:text-6xl font-bold text-white text-center">
            Sign In
        </h2>

        {% if messages %}
        {% for msg in messages %}
        <span class="mt-4 text-amber-400 font-medium text-center">
            {{ msg }}
        </span>
        {% endfor %}
        {% endif %}

        <div class="mt-10 w-full max-w-md md:max-w-lg">

            <form method="POST" class="space-y-5">
                {% csrf_token %}

                <div>
                    <input type="text" name="username" placeholder="Enter Username" required
                        class="block w-full rounded-lg bg-white/5 px-4 py-3 text-white placeholder:text-gray-400 outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500" />
                </div>

                <div>
                    <input type="password" name="password" placeholder="Enter Password" required
                        autocomplete="current-password"
                        class="block w-full rounded-lg bg-white/5 px-4 py-3 text-white placeholder:text-gray-400 outline outline-1 outline-white/10 focus:outline-2 focus:outline-indigo-500" />
                </div>

                <div class="flex justify-center">
                    <button type="submit"
                        class="w-1/2 rounded-lg bg-indigo-600 px-4 py-3 text-base font-semibold text-white hover:bg-indigo-500 transition duration-200">
                        Sign In
                    </button>
                </div>

            </form>

        </div>

    </div>

</body>

</html>
